name: Deploy EdgeOne Makers mirror

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: edgeone-makers
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VITE_DEMO_MODE: 'false'
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # EdgeOne serves this build at the domain root. GitHub Pages keeps its
      # repository-specific base path in pages.yml.
      VITE_BASE_PATH: /

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production configuration
        shell: bash
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Set VITE_SUPABASE_URL (repository variable) and VITE_SUPABASE_ANON_KEY (repository secret)."
            exit 1
          fi
          if [ -z "${EDGEONE_API_TOKEN:-}" ]; then
            echo "::error::Set the EDGEONE_API_TOKEN repository secret before enabling the EdgeOne mirror."
            exit 1
          fi
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build root-path production artifact
        run: npm run build

      - name: Deploy to EdgeOne Makers
        shell: bash
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
        run: npx --yes edgeone@latest makers deploy ./dist -n teaching-loop-platform -t "$EDGEONE_API_TOKEN" -e production
